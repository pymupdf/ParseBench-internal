name: PyMuPDF4LLM ParseBench

on:
  workflow_dispatch:
    inputs:
      benchmark_ref:
        description: "Git ref to benchmark. Leave empty to use the selected workflow branch."
        required: false
        default: ""
        type: string
      run_scope:
        description: "Dataset scope"
        required: true
        default: full
        type: choice
        options:
          - full
          - test
      group:
        description: "Benchmark group"
        required: true
        default: all
        type: choice
        options:
          - all
          - chart
          - table
          - layout
          - text_content
          - text_formatting
      gcs_prefix:
        description: "GCS object prefix for uploaded outputs"
        required: true
        default: parsebench/pymupdf4llm_markdown_150dpi
        type: string
      upload_on_failure:
        description: "Upload partial outputs if the benchmark fails"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  PIPELINE: pymupdf4llm_markdown_150dpi
  PYTHON_VERSION: "3.12"
  GCP_PROJECT_ID: pypi-download-analysis-457820
  WORKFLOW_SCRIPTS: .workflow-support/.github/scripts/pymupdf_source_stack

jobs:
  benchmark:
    name: Run benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 720

    steps:
      - name: Checkout benchmark ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.benchmark_ref || github.ref }}

      - name: Checkout workflow helpers
        uses: actions/checkout@v4
        with:
          ref: ${{ github.workflow_sha }}
          path: .workflow-support
          persist-credentials: false
          sparse-checkout: .github/scripts/pymupdf_source_stack

      - name: Resolve run configuration
        id: config
        env:
          BENCHMARK_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.benchmark_ref || '' }}
          GROUP: ${{ github.event_name == 'workflow_dispatch' && inputs.group || 'all' }}
          GCS_PREFIX: ${{ github.event_name == 'workflow_dispatch' && inputs.gcs_prefix || 'parsebench/pymupdf4llm_markdown_150dpi/smoke' }}
          RUN_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_scope || 'test' }}
        run: |
          set -euo pipefail

          output_dir="${RUNNER_TEMP}/parsebench-output"
          data_dir="data"
          if [[ "${RUN_SCOPE}" == "test" ]]; then
            data_dir="data/test"
          fi

          ref_label="${BENCHMARK_REF:-${GITHUB_REF_NAME}}"
          checked_out_sha="$(git rev-parse HEAD)"
          safe_ref="$(printf '%s' "${ref_label}" | tr '/:@ ' '----' | tr -cd 'A-Za-z0-9._-')"
          clean_prefix="${GCS_PREFIX#/}"
          clean_prefix="${clean_prefix%/}"
          destination="${clean_prefix}/${safe_ref}/run-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT}"

          mkdir -p "${output_dir}"

          {
            echo "benchmark_ref=${BENCHMARK_REF}"
            echo "checked_out_ref=${ref_label}"
            echo "checked_out_sha=${checked_out_sha}"
            echo "data_dir=${data_dir}"
            echo "destination=${destination}"
            echo "gcs_prefix=${GCS_PREFIX}"
            echo "group=${GROUP}"
            echo "output_dir=${output_dir}"
            echo "run_scope=${RUN_SCOPE}"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve exact ParseBench dataset commit
        id: dataset
        env:
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
          RUN_SCOPE: ${{ steps.config.outputs.run_scope }}
        run: python3 "$WORKFLOW_SCRIPTS/resolve_dataset.py"

      - name: Restore immutable ParseBench dataset cache
        id: dataset-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.config.outputs.data_dir }}
          key: parsebench-dataset-${{ steps.dataset.outputs.sha }}

      - name: Add dataset version to workflow summary
        env:
          DATASET_BRANCH: ${{ steps.dataset.outputs.branch }}
          DATASET_COMMIT_URL: ${{ steps.dataset.outputs.commit_url }}
          DATASET_REPOSITORY: ${{ steps.dataset.outputs.repository }}
          DATASET_SHA: ${{ steps.dataset.outputs.sha }}
        run: |
          {
            echo "## Dataset version"
            echo
            echo "- Repository: \`${DATASET_REPOSITORY}\`"
            echo "- Selected branch: \`${DATASET_BRANCH}\`"
            echo "- Exact commit: [\`${DATASET_SHA}\`](${DATASET_COMMIT_URL})"
            echo "- Download: immutable SHA cache; downloads only on a cache miss"
            echo
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Install OCR system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install dependencies
        run: uv sync --extra runners

      - name: Verify OCR dependencies
        run: |
          uv run python - <<'PY'
          import importlib.metadata
          import shutil
          import subprocess

          rapidocr_version = importlib.metadata.version("rapidocr-onnxruntime")
          if rapidocr_version != "1.2.3":
              raise SystemExit(f"Expected rapidocr-onnxruntime 1.2.3, got {rapidocr_version}")

          tesseract = shutil.which("tesseract")
          if not tesseract:
              raise SystemExit("tesseract binary is not installed")

          languages = subprocess.check_output([tesseract, "--list-langs"], text=True)
          if "eng" not in languages.split():
              raise SystemExit("Tesseract English language data is not installed")

          print(f"rapidocr-onnxruntime {rapidocr_version}")
          print(subprocess.check_output([tesseract, "--version"], text=True).splitlines()[0])
          print("Tesseract language data: eng")
          PY

      - name: Prepare versioned ParseBench dataset
        env:
          DATA_DIR: ${{ steps.config.outputs.data_dir }}
          DATASET_REPOSITORY: ${{ steps.dataset.outputs.repository }}
          DATASET_SHA: ${{ steps.dataset.outputs.sha }}
        run: uv run python "$WORKFLOW_SCRIPTS/benchmark.py" download

      - name: Write run metadata
        env:
          BENCHMARK_REF: ${{ steps.config.outputs.benchmark_ref }}
          CHECKED_OUT_REF: ${{ steps.config.outputs.checked_out_ref }}
          CHECKED_OUT_SHA: ${{ steps.config.outputs.checked_out_sha }}
          DATASET_BRANCH: ${{ steps.dataset.outputs.branch }}
          DATASET_COMMIT_URL: ${{ steps.dataset.outputs.commit_url }}
          DATASET_REPOSITORY: ${{ steps.dataset.outputs.repository }}
          DATASET_SHA: ${{ steps.dataset.outputs.sha }}
          DESTINATION: ${{ steps.config.outputs.destination }}
          GROUP: ${{ steps.config.outputs.group }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
          RUN_SCOPE: ${{ steps.config.outputs.run_scope }}
        run: |
          set -euo pipefail

          cat > "${OUTPUT_DIR}/_github_run.json" <<JSON
          {
            "pipeline": "${PIPELINE}",
            "benchmark_ref_input": "${BENCHMARK_REF}",
            "checked_out_ref": "${CHECKED_OUT_REF}",
            "checked_out_sha": "${CHECKED_OUT_SHA}",
            "github_ref": "${GITHUB_REF}",
            "github_sha": "${GITHUB_SHA}",
            "github_repository": "${GITHUB_REPOSITORY}",
            "github_run_id": "${GITHUB_RUN_ID}",
            "github_run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "github_run_url": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "run_scope": "${RUN_SCOPE}",
            "group": "${GROUP}",
            "max_concurrent": 1,
            "dataset": {
              "repository": "${DATASET_REPOSITORY}",
              "branch": "${DATASET_BRANCH}",
              "resolved_sha": "${DATASET_SHA}",
              "commit_url": "${DATASET_COMMIT_URL}"
            },
            "gcs_bucket": "${{ vars.PARSEBENCH_GCS_BUCKET }}",
            "gcs_destination": "${DESTINATION}"
          }
          JSON

      - name: Run PyMuPDF4LLM 150 DPI inference
        env:
          DATA_DIR: ${{ steps.config.outputs.data_dir }}
          GROUP: ${{ steps.config.outputs.group }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
        run: |
          set -euo pipefail

          args=(
            inference
            run
            "${PIPELINE}"
            --input_dir "${DATA_DIR}"
            --output_dir "${OUTPUT_DIR}"
            --max_concurrent 1
          )

          if [[ "${GROUP}" != "all" ]]; then
            args+=(--group "${GROUP}")
          fi

          uv run parse-bench "${args[@]}"

      - name: Run ParseBench evaluation
        env:
          DATA_DIR: ${{ steps.config.outputs.data_dir }}
          GROUP: ${{ steps.config.outputs.group }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
        run: |
          set -euo pipefail

          pipeline_output_dir="${OUTPUT_DIR}/${PIPELINE}"

          if [[ "${GROUP}" != "all" ]]; then
            uv run parse-bench evaluation run \
              --output_dir "${pipeline_output_dir}" \
              --test_cases_dir "${DATA_DIR}" \
              --group "${GROUP}" \
              --report_dir "${pipeline_output_dir}" \
              --export_csv=False \
              --export_rule_csv=False \
              --export_markdown=False \
              --export_html=False
            exit 0
          fi

          mapfile -t inference_groups < <(
            find "${pipeline_output_dir}" -mindepth 2 -maxdepth 2 -name '*.result.json' -printf '%h\n' \
              | xargs -r -n1 basename \
              | sort -u
          )

          if [[ "${#inference_groups[@]}" -eq 0 ]]; then
            echo "No inference result groups found in ${pipeline_output_dir}" >&2
            exit 1
          fi

          eval_groups=()
          for group in "${inference_groups[@]}"; do
            if [[ "${group}" == "text" ]]; then
              eval_groups+=(text_content text_formatting)
            else
              eval_groups+=("${group}")
            fi
          done
          mapfile -t eval_groups < <(printf '%s\n' "${eval_groups[@]}" | sort -u)

          printf '%s\n' "${eval_groups[@]}" > "${pipeline_output_dir}/_eval_groups.txt"

          for group in "${eval_groups[@]}"; do
            uv run parse-bench evaluation run \
              --output_dir "${pipeline_output_dir}" \
              --test_cases_dir "${DATA_DIR}" \
              --group "${group}" \
              --report_dir "${pipeline_output_dir}/${group}" \
              --export_csv=False \
              --export_rule_csv=False \
              --export_markdown=False \
              --export_html=False
          done

      - name: Generate ParseBench reports
        env:
          DATA_DIR: ${{ steps.config.outputs.data_dir }}
          GROUP: ${{ steps.config.outputs.group }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
        run: |
          set -euo pipefail

          pipeline_output_dir="${OUTPUT_DIR}/${PIPELINE}"

          if [[ "${GROUP}" != "all" ]]; then
            uv run parse-bench evaluation regenerate_report \
              --evaluation_dir "${pipeline_output_dir}" \
              --test_cases_dir "${DATA_DIR}" \
              --output_dir "${pipeline_output_dir}" \
              --report_dir "${pipeline_output_dir}"
          else
            while IFS= read -r group; do
              [[ -n "${group}" ]] || continue
              uv run parse-bench evaluation regenerate_report \
                --evaluation_dir "${pipeline_output_dir}/${group}" \
                --test_cases_dir "${DATA_DIR}" \
                --output_dir "${pipeline_output_dir}" \
                --report_dir "${pipeline_output_dir}/${group}"
            done < "${pipeline_output_dir}/_eval_groups.txt"

            uv run parse-bench analysis generate_dashboard \
              --evaluation_dir "${pipeline_output_dir}" \
              --pipeline_name "${PIPELINE}"

            uv run parse-bench analysis generate_leaderboard \
              --output_dir "${OUTPUT_DIR}"
          fi

      - name: Authenticate to Google Cloud
        if: ${{ always() && (success() || github.event_name == 'push' || inputs.upload_on_failure) }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up gcloud
        if: ${{ always() && (success() || github.event_name == 'push' || inputs.upload_on_failure) }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload outputs to GCS
        if: ${{ always() && (success() || github.event_name == 'push' || inputs.upload_on_failure) }}
        env:
          BUCKET: ${{ vars.PARSEBENCH_GCS_BUCKET }}
          DESTINATION: ${{ steps.config.outputs.destination }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
        run: |
          set -euo pipefail

          if [[ -z "${BUCKET}" ]]; then
            echo "PARSEBENCH_GCS_BUCKET repository variable is not set" >&2
            exit 1
          fi

          if ! find "${OUTPUT_DIR}" -type f -print -quit | grep -q .; then
            echo "No output files found in ${OUTPUT_DIR}; skipping upload."
            exit 0
          fi

          output_uri="gs://${BUCKET}/${DESTINATION}/parsebench-output/"
          public_url="https://storage.googleapis.com/${BUCKET}/${DESTINATION}/parsebench-output/"
          leaderboard_url="${public_url}_leaderboard.html"
          public_bucket_url="https://storage.googleapis.com/${BUCKET}"
          public_listing_url="https://storage.googleapis.com/${BUCKET}?prefix=${DESTINATION}/parsebench-output/"
          bucket_console_url="https://console.cloud.google.com/storage/browser/${BUCKET}?project=${GCP_PROJECT_ID}"
          output_console_url="https://console.cloud.google.com/storage/browser/${BUCKET}/${DESTINATION}/parsebench-output?project=${GCP_PROJECT_ID}"

          gcloud storage cp --recursive "${OUTPUT_DIR}" "gs://${BUCKET}/${DESTINATION}/"

          leaderboard_public_status="not generated for this run"
          leaderboard_public_failed=0
          if [[ -f "${OUTPUT_DIR}/_leaderboard.html" ]]; then
            if curl --fail --silent --show-error --head --retry 5 --retry-delay 5 --retry-all-errors "${leaderboard_url}" >/dev/null; then
              leaderboard_public_status="verified publicly reachable"
            else
              leaderboard_public_status="FAILED public reachability check"
              leaderboard_public_failed=1
            fi
          fi

          {
            echo "## ParseBench output upload"
            echo
            echo "- GCS path: \`${output_uri}\`"
            if [[ -f "${OUTPUT_DIR}/_leaderboard.html" ]]; then
              echo "- Public leaderboard HTML: [download _leaderboard.html](${leaderboard_url})"
            else
              echo "- Public leaderboard HTML: not generated for this run"
            fi
            echo "- Public access check: ${leaderboard_public_status}"
            echo "- Public bucket listing: [open ${BUCKET}](${public_bucket_url})"
            echo "- Public object listing: [open uploaded output prefix](${public_listing_url})"
            echo "- Google Cloud bucket: [open ${BUCKET}](${bucket_console_url})"
            echo "- Google Cloud output browser: [open uploaded output prefix](${output_console_url})"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${leaderboard_public_failed}" -ne 0 ]]; then
            echo "Leaderboard URL is not publicly reachable: ${leaderboard_url}" >&2
            exit 1
          fi

      - name: Upload GitHub artifact
        if: ${{ always() && (success() || github.event_name == 'push' || inputs.upload_on_failure) }}
        uses: actions/upload-artifact@v4
        with:
          name: parsebench-output-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.config.outputs.output_dir }}
          if-no-files-found: ignore
