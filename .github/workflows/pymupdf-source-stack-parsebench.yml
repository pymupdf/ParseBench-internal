name: PyMuPDF Source Stack ParseBench

on:
  workflow_dispatch:
    inputs:
      benchmark_ref:
        description: "ParseBench branch, tag, or commit. Empty uses the selected workflow branch."
        required: false
        default: ""
        type: string
      pymupdf_repository:
        description: "PyMuPDF GitHub repository"
        required: true
        default: pymupdf/PyMuPDF
        type: string
      pymupdf_ref:
        description: "PyMuPDF branch, tag, or commit"
        required: true
        default: "1.28.0"
        type: string
      pymupdf_layout_repository:
        description: "PyMuPDF Layout GitHub repository (may require PYMUPDF_SOURCE_TOKEN)"
        required: true
        default: ArtifexSoftware/sce
        type: string
      pymupdf_layout_ref:
        description: "PyMuPDF Layout branch, tag, or commit"
        required: true
        default: bc9127e72de0f4d75935a4ef51d141e928dd7943
        type: string
      pymupdf4llm_repository:
        description: "PyMuPDF4LLM GitHub repository"
        required: true
        default: pymupdf/pymupdf4llm
        type: string
      pymupdf4llm_ref:
        description: "PyMuPDF4LLM branch, tag, or commit"
        required: true
        default: "1.28.0"
        type: string
      run_scope:
        description: "Dataset scope"
        required: true
        default: test
        type: choice
        options:
          - test
          - full
      group:
        description: "Benchmark group"
        required: true
        default: all
        type: choice
        options:
          - all
          - chart
          - table
          - layout
          - text_content
          - text_formatting
      gcs_prefix:
        description: "GCS object prefix for uploaded outputs"
        required: true
        default: parsebench/pymupdf_source_stack
        type: string
      publish_to_gcs:
        description: "Publish outputs to the configured GCS bucket"
        required: true
        default: true
        type: boolean
      upload_on_failure:
        description: "Upload partial outputs if the benchmark fails"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  PIPELINE: pymupdf4llm_markdown_150dpi
  PYTHON_VERSION: "3.12"
  GCP_PROJECT_ID: pypi-download-analysis-457820
  DATASET_CACHE_VERSION: v1
  UV_NO_SYNC: "1"

jobs:
  benchmark:
    name: Build, check, and benchmark source stack
    runs-on: ubuntu-latest
    timeout-minutes: 720
    outputs:
      artifact_name: ${{ steps.config.outputs.artifact_name }}
      destination: ${{ steps.config.outputs.destination }}

    steps:
      - name: Checkout ParseBench
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.benchmark_ref || github.ref }}

      - name: Initialize run configuration
        id: config
        env:
          BENCHMARK_REF: ${{ inputs.benchmark_ref }}
          GCS_PREFIX: ${{ inputs.gcs_prefix }}
          GROUP: ${{ inputs.group }}
          PYMUPDF4LLM_REF: ${{ inputs.pymupdf4llm_ref }}
          PYMUPDF_LAYOUT_REF: ${{ inputs.pymupdf_layout_ref }}
          PYMUPDF_REF: ${{ inputs.pymupdf_ref }}
          RUN_SCOPE: ${{ inputs.run_scope }}
        run: |
          set -euo pipefail

          output_dir="${RUNNER_TEMP}/parsebench-output"
          data_dir="data"
          if [[ "${RUN_SCOPE}" == "test" ]]; then
            data_dir="data/test"
          fi

          safe_ref() {
            printf '%s' "$1" | tr '/:@ ' '----' | tr -cd 'A-Za-z0-9._-' | cut -c1-48
          }

          benchmark_label="$(safe_ref "${BENCHMARK_REF:-${GITHUB_REF_NAME}}")"
          pymupdf_label="$(safe_ref "${PYMUPDF_REF}")"
          layout_label="$(safe_ref "${PYMUPDF_LAYOUT_REF}")"
          llm_label="$(safe_ref "${PYMUPDF4LLM_REF}")"
          stack_label="pymupdf-${pymupdf_label}_layout-${layout_label}_4llm-${llm_label}"
          clean_prefix="${GCS_PREFIX#/}"
          clean_prefix="${clean_prefix%/}"
          destination="${clean_prefix}/${stack_label}/${benchmark_label}/run-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT}"
          artifact_name="pymupdf-source-stack-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          mkdir -p "${output_dir}"

          {
            echo "artifact_name=${artifact_name}"
            echo "benchmark_ref=${BENCHMARK_REF}"
            echo "data_dir=${data_dir}"
            echo "destination=${destination}"
            echo "group=${GROUP}"
            echo "output_dir=${output_dir}"
            echo "run_scope=${RUN_SCOPE}"
          } >> "${GITHUB_OUTPUT}"

      - name: Record requested source stack
        env:
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
          PYMUPDF4LLM_REF: ${{ inputs.pymupdf4llm_ref }}
          PYMUPDF4LLM_REPOSITORY: ${{ inputs.pymupdf4llm_repository }}
          PYMUPDF_LAYOUT_REF: ${{ inputs.pymupdf_layout_ref }}
          PYMUPDF_LAYOUT_REPOSITORY: ${{ inputs.pymupdf_layout_repository }}
          PYMUPDF_REF: ${{ inputs.pymupdf_ref }}
          PYMUPDF_REPOSITORY: ${{ inputs.pymupdf_repository }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          request = {
              "pymupdf": {"repository": os.environ["PYMUPDF_REPOSITORY"], "ref": os.environ["PYMUPDF_REF"]},
              "pymupdf_layout": {
                  "repository": os.environ["PYMUPDF_LAYOUT_REPOSITORY"],
                  "ref": os.environ["PYMUPDF_LAYOUT_REF"],
              },
              "pymupdf4llm": {
                  "repository": os.environ["PYMUPDF4LLM_REPOSITORY"],
                  "ref": os.environ["PYMUPDF4LLM_REF"],
              },
          }
          output = Path(os.environ["OUTPUT_DIR"]) / "_source_request.json"
          output.write_text(json.dumps(request, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY

      - name: Checkout PyMuPDF
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.pymupdf_repository }}
          ref: ${{ inputs.pymupdf_ref }}
          path: .source/pymupdf
          fetch-depth: 1
          persist-credentials: false
          token: ${{ secrets.PYMUPDF_SOURCE_TOKEN || github.token }}

      - name: Checkout PyMuPDF Layout
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.pymupdf_layout_repository }}
          ref: ${{ inputs.pymupdf_layout_ref }}
          path: .source/pymupdf-layout
          fetch-depth: 1
          persist-credentials: false
          token: ${{ secrets.PYMUPDF_SOURCE_TOKEN || github.token }}

      - name: Checkout PyMuPDF4LLM
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.pymupdf4llm_repository }}
          ref: ${{ inputs.pymupdf4llm_ref }}
          path: .source/pymupdf4llm
          fetch-depth: 1
          persist-credentials: false
          token: ${{ secrets.PYMUPDF_SOURCE_TOKEN || github.token }}

      - name: Resolve source packages and commits
        id: sources
        run: |
          set -euo pipefail

          resolve_package_dir() {
            local root="$1"
            shift
            local candidate
            for candidate in "${root}" "$@"; do
              if [[ -f "${candidate}/pyproject.toml" || -f "${candidate}/setup.py" ]]; then
                printf '%s' "${candidate}"
                return 0
              fi
            done
            echo "::error title=Unbuildable source ref::No pyproject.toml or setup.py found under ${root}"
            return 1
          }

          pymupdf_dir="$(resolve_package_dir .source/pymupdf)"
          layout_dir="$(resolve_package_dir .source/pymupdf-layout .source/pymupdf-layout/pymupdf_layout)"
          llm_dir="$(resolve_package_dir .source/pymupdf4llm .source/pymupdf4llm/pymupdf4llm)"

          {
            echo "pymupdf_dir=${pymupdf_dir}"
            echo "pymupdf_sha=$(git -C .source/pymupdf rev-parse HEAD)"
            echo "layout_dir=${layout_dir}"
            echo "layout_sha=$(git -C .source/pymupdf-layout rev-parse HEAD)"
            echo "llm_dir=${llm_dir}"
            echo "llm_sha=$(git -C .source/pymupdf4llm rev-parse HEAD)"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv and source build tools
        run: |
          python -m pip install --upgrade uv
          sudo apt-get update
          sudo apt-get install -y build-essential swig tesseract-ocr tesseract-ocr-eng

      - name: Install ParseBench dependencies without pinned PyMuPDF packages
        run: |
          uv sync --extra runners \
            --no-install-package pymupdf \
            --no-install-package pymupdf-layout \
            --no-install-package pymupdf4llm
          uv pip install --python .venv pipcl

      - name: Build and install selected PyMuPDF
        env:
          PACKAGE_DIR: ${{ steps.sources.outputs.pymupdf_dir }}
        run: |
          uv pip install --python .venv --reinstall --no-deps "${PACKAGE_DIR}"

      - name: Build and install selected PyMuPDF Layout
        env:
          PACKAGE_DIR: ${{ steps.sources.outputs.layout_dir }}
          PYMUPDF_LAYOUT_SETUP_BUILD_PYMUPDF: "1"
        run: |
          uv pip install --python .venv --reinstall --no-build-isolation --no-deps "${PACKAGE_DIR}"

      - name: Build and install selected PyMuPDF4LLM
        env:
          PACKAGE_DIR: ${{ steps.sources.outputs.llm_dir }}
          PYMUPDF_SETUP_VERSION: "1"
        run: |
          uv pip install --python .venv --reinstall --no-deps "${PACKAGE_DIR}"

      - name: Check source stack compatibility
        env:
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
          PYMUPDF4LLM_REF: ${{ inputs.pymupdf4llm_ref }}
          PYMUPDF4LLM_REPOSITORY: ${{ inputs.pymupdf4llm_repository }}
          PYMUPDF4LLM_SHA: ${{ steps.sources.outputs.llm_sha }}
          PYMUPDF_LAYOUT_REF: ${{ inputs.pymupdf_layout_ref }}
          PYMUPDF_LAYOUT_REPOSITORY: ${{ inputs.pymupdf_layout_repository }}
          PYMUPDF_LAYOUT_SHA: ${{ steps.sources.outputs.layout_sha }}
          PYMUPDF_REF: ${{ inputs.pymupdf_ref }}
          PYMUPDF_REPOSITORY: ${{ inputs.pymupdf_repository }}
          PYMUPDF_SHA: ${{ steps.sources.outputs.pymupdf_sha }}
        run: |
          .venv/bin/python scripts/check_pymupdf_stack_compatibility.py \
            --output "${OUTPUT_DIR}/_compatibility.json" \
            --pymupdf-repository "${PYMUPDF_REPOSITORY}" \
            --pymupdf-ref "${PYMUPDF_REF}" \
            --pymupdf-sha "${PYMUPDF_SHA}" \
            --pymupdf-layout-repository "${PYMUPDF_LAYOUT_REPOSITORY}" \
            --pymupdf-layout-ref "${PYMUPDF_LAYOUT_REF}" \
            --pymupdf-layout-sha "${PYMUPDF_LAYOUT_SHA}" \
            --pymupdf4llm-repository "${PYMUPDF4LLM_REPOSITORY}" \
            --pymupdf4llm-ref "${PYMUPDF4LLM_REF}" \
            --pymupdf4llm-sha "${PYMUPDF4LLM_SHA}"

      - name: Restore ParseBench dataset cache
        uses: actions/cache@v4
        with:
          path: |
            data
            ~/.cache/huggingface
          key: parsebench-data-${{ runner.os }}-${{ env.DATASET_CACHE_VERSION }}-${{ steps.config.outputs.run_scope }}
          restore-keys: |
            parsebench-data-${{ runner.os }}-${{ env.DATASET_CACHE_VERSION }}-${{ steps.config.outputs.run_scope }}-

      - name: Download ParseBench dataset
        env:
          RUN_SCOPE: ${{ steps.config.outputs.run_scope }}
        run: |
          if [[ "${RUN_SCOPE}" == "test" ]]; then
            uv run parse-bench download --test
          else
            uv run parse-bench download
          fi

      - name: Write run metadata
        env:
          BENCHMARK_REF: ${{ steps.config.outputs.benchmark_ref }}
          DESTINATION: ${{ steps.config.outputs.destination }}
          GROUP: ${{ steps.config.outputs.group }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
          RUN_SCOPE: ${{ steps.config.outputs.run_scope }}
        run: |
          .venv/bin/python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          output_dir = Path(os.environ["OUTPUT_DIR"])
          compatibility = json.loads((output_dir / "_compatibility.json").read_text(encoding="utf-8"))
          metadata = {
              "pipeline": os.environ["PIPELINE"],
              "benchmark_ref_input": os.environ["BENCHMARK_REF"],
              "checked_out_sha": subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip(),
              "github_ref": os.environ["GITHUB_REF"],
              "github_sha": os.environ["GITHUB_SHA"],
              "github_repository": os.environ["GITHUB_REPOSITORY"],
              "github_run_id": os.environ["GITHUB_RUN_ID"],
              "github_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "github_run_url": (
                  f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}"
                  f"/actions/runs/{os.environ['GITHUB_RUN_ID']}"
              ),
              "run_scope": os.environ["RUN_SCOPE"],
              "group": os.environ["GROUP"],
              "max_concurrent": 1,
              "gcs_bucket": os.environ.get("PARSEBENCH_GCS_BUCKET", ""),
              "gcs_destination": os.environ["DESTINATION"],
              "source_stack": compatibility,
          }
          (output_dir / "_github_run.json").write_text(
              json.dumps(metadata, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Run PyMuPDF4LLM 150 DPI inference
        env:
          DATA_DIR: ${{ steps.config.outputs.data_dir }}
          GROUP: ${{ steps.config.outputs.group }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
        run: |
          set -euo pipefail
          args=(
            inference run "${PIPELINE}"
            --input_dir "${DATA_DIR}"
            --output_dir "${OUTPUT_DIR}"
            --max_concurrent 1
          )
          if [[ "${GROUP}" != "all" ]]; then
            args+=(--group "${GROUP}")
          fi
          uv run parse-bench "${args[@]}"

      - name: Run ParseBench evaluation
        env:
          DATA_DIR: ${{ steps.config.outputs.data_dir }}
          GROUP: ${{ steps.config.outputs.group }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
        run: |
          set -euo pipefail
          pipeline_output_dir="${OUTPUT_DIR}/${PIPELINE}"

          if [[ "${GROUP}" != "all" ]]; then
            uv run parse-bench evaluation run \
              --output_dir "${pipeline_output_dir}" \
              --test_cases_dir "${DATA_DIR}" \
              --group "${GROUP}" \
              --report_dir "${pipeline_output_dir}" \
              --export_csv=False \
              --export_rule_csv=False \
              --export_markdown=False \
              --export_html=False
            exit 0
          fi

          mapfile -t inference_groups < <(
            find "${pipeline_output_dir}" -mindepth 2 -maxdepth 2 -name '*.result.json' -printf '%h\n' \
              | xargs -r -n1 basename \
              | sort -u
          )
          if [[ "${#inference_groups[@]}" -eq 0 ]]; then
            echo "No inference result groups found in ${pipeline_output_dir}" >&2
            exit 1
          fi

          eval_groups=()
          for group in "${inference_groups[@]}"; do
            if [[ "${group}" == "text" ]]; then
              eval_groups+=(text_content text_formatting)
            else
              eval_groups+=("${group}")
            fi
          done
          mapfile -t eval_groups < <(printf '%s\n' "${eval_groups[@]}" | sort -u)
          printf '%s\n' "${eval_groups[@]}" > "${pipeline_output_dir}/_eval_groups.txt"

          for group in "${eval_groups[@]}"; do
            uv run parse-bench evaluation run \
              --output_dir "${pipeline_output_dir}" \
              --test_cases_dir "${DATA_DIR}" \
              --group "${group}" \
              --report_dir "${pipeline_output_dir}/${group}" \
              --export_csv=False \
              --export_rule_csv=False \
              --export_markdown=False \
              --export_html=False
          done

      - name: Generate ParseBench reports
        env:
          DATA_DIR: ${{ steps.config.outputs.data_dir }}
          GROUP: ${{ steps.config.outputs.group }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
        run: |
          set -euo pipefail
          pipeline_output_dir="${OUTPUT_DIR}/${PIPELINE}"

          if [[ "${GROUP}" != "all" ]]; then
            uv run parse-bench evaluation regenerate_report \
              --evaluation_dir "${pipeline_output_dir}" \
              --test_cases_dir "${DATA_DIR}" \
              --output_dir "${pipeline_output_dir}" \
              --report_dir "${pipeline_output_dir}"
          else
            while IFS= read -r group; do
              [[ -n "${group}" ]] || continue
              uv run parse-bench evaluation regenerate_report \
                --evaluation_dir "${pipeline_output_dir}/${group}" \
                --test_cases_dir "${DATA_DIR}" \
                --output_dir "${pipeline_output_dir}" \
                --report_dir "${pipeline_output_dir}/${group}"
            done < "${pipeline_output_dir}/_eval_groups.txt"

            uv run parse-bench analysis generate_dashboard \
              --evaluation_dir "${pipeline_output_dir}" \
              --pipeline_name "${PIPELINE}"
            uv run parse-bench analysis generate_leaderboard \
              --output_dir "${OUTPUT_DIR}"
          fi

      - name: Upload source-stack GitHub artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.config.outputs.artifact_name }}
          path: ${{ steps.config.outputs.output_dir }}
          if-no-files-found: error

  publish:
    name: Publish source-stack outputs
    needs: benchmark
    if: >-
      ${{
        always() &&
        inputs.publish_to_gcs &&
        (needs.benchmark.result == 'success' || inputs.upload_on_failure) &&
        needs.benchmark.outputs.artifact_name != ''
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.benchmark.outputs.artifact_name }}
          path: parsebench-output

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload outputs to GCS
        env:
          BUCKET: ${{ vars.PARSEBENCH_GCS_BUCKET }}
          DESTINATION: ${{ needs.benchmark.outputs.destination }}
          OUTPUT_DIR: parsebench-output
        run: |
          set -euo pipefail
          if [[ -z "${BUCKET}" ]]; then
            echo "PARSEBENCH_GCS_BUCKET repository variable is not set" >&2
            exit 1
          fi
          if ! find "${OUTPUT_DIR}" -type f -print -quit | grep -q .; then
            echo "No output files found in ${OUTPUT_DIR}" >&2
            exit 1
          fi

          output_uri="gs://${BUCKET}/${DESTINATION}/parsebench-output/"
          public_url="https://storage.googleapis.com/${BUCKET}/${DESTINATION}/parsebench-output/"
          leaderboard_url="${public_url}_leaderboard.html"
          gcloud storage cp --recursive "${OUTPUT_DIR}" "gs://${BUCKET}/${DESTINATION}/"

          {
            echo "## PyMuPDF source-stack output"
            echo
            echo "- GCS path: \`${output_uri}\`"
            if [[ -f "${OUTPUT_DIR}/_leaderboard.html" ]]; then
              echo "- Public leaderboard HTML: [download _leaderboard.html](${leaderboard_url})"
            else
              echo "- Public leaderboard HTML: not generated for this run"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
