name: ParseBench Version Lab

run-name: >-
  ${{
    inputs.latest_any_branch &&
    'Latest commits from any branches' ||
    inputs.all_latest &&
    'Latest main-branch commits' ||
    inputs.pymupdf_ref == '1.28.0' &&
    inputs.pymupdf_layout_ref == '1.28.0' &&
    inputs.pymupdf4llm_ref == '1.28.0' &&
    'Versions 1.28.0' ||
    'Custom versions'
  }} · ${{ inputs.run_scope }} · ${{ inputs.group }}

on:
  workflow_dispatch:
    inputs:
      all_latest:
        description: "Use latest main-branch commits for PyMuPDF, Layout and PyMuPDF4LLM. Their ref inputs are ignored."
        required: true
        default: false
        type: boolean
      latest_any_branch:
        description: "Use the newest branch-head commit in each of the three source repositories. Cannot be combined with latest main-branch commits."
        required: true
        default: false
        type: boolean
      dataset_version:
        description: "Dataset version: current, or a full 40-character Hugging Face commit SHA."
        required: true
        default: current
        type: string
      pymupdf_ref:
        description: "PyMuPDF version, branch or full 40-character commit SHA. Standard: 1.28.0. Ignored by either automatic latest mode."
        required: true
        default: "1.28.0"
        type: string
      pymupdf_layout_ref:
        description: "PyMuPDF Layout version, branch or commit. Standard: 1.28.0. Ignored by either automatic latest mode."
        required: true
        default: "1.28.0"
        type: string
      pymupdf4llm_ref:
        description: "PyMuPDF4LLM version, branch or commit. Standard: 1.28.0. Ignored by either automatic latest mode."
        required: true
        default: "1.28.0"
        type: string
      run_scope:
        description: "How much data should be tested?"
        required: true
        default: "Quick test (15 cases)"
        type: choice
        options:
          - "Quick test (15 cases)"
          - "Full benchmark (~2,000 pages)"
      group:
        description: "Which document category should be tested?"
        required: true
        default: "All categories"
        type: choice
        options:
          - "All categories"
          - Charts
          - Tables
          - "Page layout"
          - "Text content"
          - "Text formatting"

permissions:
  contents: read
  packages: read

env:
  PIPELINE: pymupdf4llm_html_tables
  GCP_PROJECT_ID: pypi-download-analysis-457820
  GCS_PREFIX: parsebench/pymupdf_source_stack
  UV_NO_SYNC: "1"
  WORKFLOW_SCRIPTS: .workflow-support/.github/scripts/pymupdf_source_stack
  # temporary forensics (run branch only): inject a sitecustomize watchdog
  # into every python of the job, bypassing the baked container package
  PYTHONPATH: .workflow-support/.github/scripts/pymupdf_source_stack/inject

jobs:
  benchmark:
    name: Check compatibility and run benchmark in pinned container
    runs-on: ubuntu-24.04
    timeout-minutes: 720
    container:
      image: ghcr.io/pymupdf/parsebench-source-stack-env@sha256:be78034c9188ad341b8d02d34d1702e3d8a870c47dc65a261e3d972718d26601
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}
    defaults:
      run:
        shell: bash
    outputs:
      artifact_name: ${{ steps.config.outputs.artifact_name }}
      destination: ${{ steps.config.outputs.destination }}

    steps:
      - name: Checkout ParseBench
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout workflow helpers
        uses: actions/checkout@v4
        with:
          ref: ${{ github.workflow_sha }}
          path: .workflow-support
          persist-credentials: false
          sparse-checkout: .github/scripts/pymupdf_source_stack

      - name: Initialize run configuration
        id: config
        env:
          ALL_LATEST: ${{ inputs.all_latest }}
          BENCHMARK_REF: main
          DATASET_REF: ${{ inputs.dataset_version }}
          GROUP_SELECTION: ${{ inputs.group }}
          LATEST_ANY_BRANCH: ${{ inputs.latest_any_branch }}
          PYMUPDF4LLM_REF: ${{ inputs.pymupdf4llm_ref }}
          PYMUPDF_LAYOUT_REF: ${{ inputs.pymupdf_layout_ref }}
          PYMUPDF_REF: ${{ inputs.pymupdf_ref }}
          RUN_SCOPE_SELECTION: ${{ inputs.run_scope }}
        run: python3 "$WORKFLOW_SCRIPTS/configure.py"

      - name: Resolve newest branch-head commits
        id: latest-branches
        if: ${{ steps.config.outputs.latest_any_branch == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PYMUPDF_SOURCE_TOKEN || github.token }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
        run: python3 "$WORKFLOW_SCRIPTS/resolve_latest_branches.py"

      - name: Resolve PyMuPDF Layout repository and commit
        id: layout-source
        if: ${{ steps.config.outputs.latest_any_branch != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.PYMUPDF_SOURCE_TOKEN || github.token }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
          PREFER_CURRENT_REPOSITORY: ${{ steps.config.outputs.all_latest }}
          PYMUPDF_LAYOUT_REF: ${{ steps.config.outputs.pymupdf_layout_ref }}
        run: python3 "$WORKFLOW_SCRIPTS/resolve_layout_source.py"

      - name: Record and verify pinned container environment
        env:
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
        run: |
          cp /usr/local/share/parsebench/environment.txt "$OUTPUT_DIR/_container_environment.txt"
          test "$(python --version)" = "Python 3.12.13"
          test "$(uv --version | cut -d' ' -f2)" = "0.11.29"
          test "$(dpkg-query -W -f='${Version}' tesseract-ocr)" = "5.3.4-1build5"
          test "$(dpkg-query -W -f='${Version}' tesseract-ocr-eng)" = "1:4.1.0-2"
          tesseract --list-langs | grep -Fx eng
          {
            echo "## Container environment"
            echo
            echo "- Image: \`ghcr.io/pymupdf/parsebench-source-stack-env\`"
            echo "- Digest: \`sha256:be78034c9188ad341b8d02d34d1702e3d8a870c47dc65a261e3d972718d26601\`"
            echo "- Python: \`$(python --version)\`"
            echo "- Tesseract package: \`$(dpkg-query -W -f='${Version}' tesseract-ocr)\`"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve exact ParseBench dataset commit
        id: dataset
        env:
          DATASET_REF: ${{ steps.config.outputs.dataset_ref }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
          RUN_SCOPE: ${{ steps.config.outputs.run_scope }}
        run: python3 "$WORKFLOW_SCRIPTS/resolve_dataset.py"

      - name: Restore immutable ParseBench dataset cache
        id: dataset-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.config.outputs.data_dir }}
          key: parsebench-dataset-${{ steps.dataset.outputs.sha }}

      - name: Checkout PyMuPDF
        uses: actions/checkout@v4
        with:
          repository: pymupdf/PyMuPDF
          ref: ${{ steps.latest-branches.outputs.pymupdf_sha || steps.config.outputs.pymupdf_ref }}
          path: .source/pymupdf
          fetch-depth: 1
          persist-credentials: false
          token: ${{ secrets.PYMUPDF_SOURCE_TOKEN || github.token }}

      - name: Checkout PyMuPDF Layout
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.latest-branches.outputs.pymupdf_layout_repository || steps.layout-source.outputs.repository }}
          ref: ${{ steps.latest-branches.outputs.pymupdf_layout_sha || steps.layout-source.outputs.sha }}
          path: .source/pymupdf-layout
          fetch-depth: 1
          persist-credentials: false
          token: ${{ secrets.PYMUPDF_SOURCE_TOKEN || github.token }}

      - name: Checkout PyMuPDF4LLM
        uses: actions/checkout@v4
        with:
          repository: pymupdf/pymupdf4llm
          ref: ${{ steps.latest-branches.outputs.pymupdf4llm_sha || steps.config.outputs.pymupdf4llm_ref }}
          path: .source/pymupdf4llm
          fetch-depth: 1
          persist-credentials: false
          token: ${{ secrets.PYMUPDF_SOURCE_TOKEN || github.token }}

      - name: Trust container-mounted Git checkouts
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/.source/pymupdf"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/.source/pymupdf-layout"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/.source/pymupdf4llm"

      - name: Add selected configuration to workflow summary
        env:
          ALL_LATEST: ${{ steps.config.outputs.all_latest }}
          BENCHMARK_REF: main
          DATASET_BRANCH: ${{ steps.dataset.outputs.branch }}
          DATASET_REPOSITORY: ${{ steps.dataset.outputs.repository }}
          DATASET_REQUESTED_REF: ${{ steps.dataset.outputs.requested_ref }}
          DATASET_SHA: ${{ steps.dataset.outputs.sha }}
          GITHUB_TOKEN: ${{ secrets.PYMUPDF_SOURCE_TOKEN || github.token }}
          GROUP_SELECTION: ${{ inputs.group }}
          LATEST_ANY_BRANCH: ${{ steps.config.outputs.latest_any_branch }}
          PYMUPDF4LLM_REF: ${{ steps.latest-branches.outputs.pymupdf4llm_branch || steps.config.outputs.pymupdf4llm_ref }}
          PYMUPDF_LAYOUT_REF: ${{ steps.latest-branches.outputs.pymupdf_layout_branch || steps.config.outputs.pymupdf_layout_ref }}
          PYMUPDF_LAYOUT_REPOSITORY: ${{ steps.latest-branches.outputs.pymupdf_layout_repository || steps.layout-source.outputs.repository }}
          PYMUPDF_REF: ${{ steps.latest-branches.outputs.pymupdf_branch || steps.config.outputs.pymupdf_ref }}
          RUN_SCOPE_SELECTION: ${{ inputs.run_scope }}
        run: python3 "$WORKFLOW_SCRIPTS/write_run_summary.py"

      - name: Resolve source packages and commits
        id: sources
        env:
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
          PYMUPDF4LLM_REF: ${{ steps.latest-branches.outputs.pymupdf4llm_branch || steps.config.outputs.pymupdf4llm_ref }}
          PYMUPDF_LAYOUT_REF: ${{ steps.latest-branches.outputs.pymupdf_layout_branch || steps.config.outputs.pymupdf_layout_ref }}
          PYMUPDF_REF: ${{ steps.latest-branches.outputs.pymupdf_branch || steps.config.outputs.pymupdf_ref }}
        run: python3 "$WORKFLOW_SCRIPTS/resolve_sources.py"

      - name: Install ParseBench dependencies without selected PyMuPDF packages
        run: |
          uv sync --locked --extra runners \
            --no-install-package pymupdf \
            --no-install-package pymupdf-layout \
            --no-install-package pymupdf4llm
          uv pip install --python .venv "pipcl==12"

      - name: Install temporary PyMuPDF4LLM branch dependency
        run: uv pip install --python .venv "psutil==7.2.2"

      - name: Verify RapidOCR native runtime
        run: .venv/bin/python -c "from rapidocr_onnxruntime import RapidOCR; print(RapidOCR)"

      - name: Build and install selected PyMuPDF
        env:
          PACKAGE_DIR: ${{ steps.sources.outputs.pymupdf_dir }}
        run: uv pip install --python .venv --reinstall --no-deps "$PACKAGE_DIR"

      - name: Build and install selected PyMuPDF Layout
        env:
          PACKAGE_DIR: ${{ steps.sources.outputs.layout_dir }}
          PYMUPDF_LAYOUT_SETUP_BUILD_PYMUPDF: "1"
        run: uv pip install --python .venv --reinstall --no-build-isolation --no-deps "$PACKAGE_DIR"

      - name: Build and install selected PyMuPDF4LLM
        env:
          PACKAGE_DIR: ${{ steps.sources.outputs.llm_dir }}
          PYMUPDF_SETUP_VERSION: "1"
        run: uv pip install --python .venv --reinstall --no-deps "$PACKAGE_DIR"

      - name: Check source stack compatibility
        env:
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
          PYMUPDF4LLM_REF: ${{ steps.latest-branches.outputs.pymupdf4llm_branch || steps.config.outputs.pymupdf4llm_ref }}
          PYMUPDF_LAYOUT_REF: ${{ steps.latest-branches.outputs.pymupdf_layout_branch || steps.config.outputs.pymupdf_layout_ref }}
          PYMUPDF_LAYOUT_REPOSITORY: ${{ steps.latest-branches.outputs.pymupdf_layout_repository || steps.layout-source.outputs.repository }}
          PYMUPDF_REF: ${{ steps.latest-branches.outputs.pymupdf_branch || steps.config.outputs.pymupdf_ref }}
        run: |
          .venv/bin/python "$WORKFLOW_SCRIPTS/check_compatibility.py" \
            --output "$OUTPUT_DIR/_compatibility.json" \
            --pymupdf-repository pymupdf/PyMuPDF \
            --pymupdf-ref "$PYMUPDF_REF" \
            --pymupdf-sha "${{ steps.sources.outputs.pymupdf_sha }}" \
            --pymupdf-layout-repository "$PYMUPDF_LAYOUT_REPOSITORY" \
            --pymupdf-layout-ref "$PYMUPDF_LAYOUT_REF" \
            --pymupdf-layout-sha "${{ steps.sources.outputs.layout_sha }}" \
            --pymupdf4llm-repository pymupdf/pymupdf4llm \
            --pymupdf4llm-ref "$PYMUPDF4LLM_REF" \
            --pymupdf4llm-sha "${{ steps.sources.outputs.llm_sha }}"

      - name: Prepare versioned ParseBench dataset
        env:
          DATA_DIR: ${{ steps.config.outputs.data_dir }}
          DATASET_REPOSITORY: ${{ steps.dataset.outputs.repository }}
          DATASET_SHA: ${{ steps.dataset.outputs.sha }}
        run: .venv/bin/python "$WORKFLOW_SCRIPTS/benchmark.py" download

      - name: Write run metadata
        env:
          BENCHMARK_REF: ${{ steps.config.outputs.benchmark_ref }}
          DATASET_BRANCH: ${{ steps.dataset.outputs.branch }}
          DATASET_COMMIT_URL: ${{ steps.dataset.outputs.commit_url }}
          DATASET_REPOSITORY: ${{ steps.dataset.outputs.repository }}
          DATASET_REQUESTED_REF: ${{ steps.dataset.outputs.requested_ref }}
          DATASET_SHA: ${{ steps.dataset.outputs.sha }}
          DESTINATION: ${{ steps.config.outputs.destination }}
          GROUP: ${{ steps.config.outputs.group }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
          PARSEBENCH_GCS_BUCKET: ${{ vars.PARSEBENCH_GCS_BUCKET }}
          RUN_SCOPE: ${{ steps.config.outputs.run_scope }}
        run: .venv/bin/python "$WORKFLOW_SCRIPTS/write_run_metadata.py"

      - name: Run PyMuPDF4LLM 150 DPI inference
        env:
          DATA_DIR: ${{ steps.config.outputs.data_dir }}
          GROUP: ${{ steps.config.outputs.group }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
        run: .venv/bin/python "$WORKFLOW_SCRIPTS/benchmark.py" inference

      - name: Run ParseBench evaluation
        env:
          DATA_DIR: ${{ steps.config.outputs.data_dir }}
          GROUP: ${{ steps.config.outputs.group }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
        run: .venv/bin/python "$WORKFLOW_SCRIPTS/benchmark.py" evaluate

      - name: Generate ParseBench reports
        env:
          DATA_DIR: ${{ steps.config.outputs.data_dir }}
          GROUP: ${{ steps.config.outputs.group }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
        run: .venv/bin/python "$WORKFLOW_SCRIPTS/benchmark.py" report

      - name: Add aggregate results to workflow summary
        env:
          GROUP: ${{ steps.config.outputs.group }}
          OUTPUT_DIR: ${{ steps.config.outputs.output_dir }}
        run: .venv/bin/python "$WORKFLOW_SCRIPTS/write_results_summary.py"

      - name: Upload source-stack GitHub artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.config.outputs.artifact_name }}
          path: ${{ steps.config.outputs.output_dir }}
          if-no-files-found: error

  publish:
    name: Publish results or diagnostics
    needs: benchmark
    if: ${{ always() && needs.benchmark.outputs.artifact_name != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout publishing helper
        uses: actions/checkout@v4
        with:
          ref: ${{ github.workflow_sha }}
          path: .workflow-support
          persist-credentials: false
          sparse-checkout: .github/scripts/pymupdf_source_stack

      - name: Download benchmark artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.benchmark.outputs.artifact_name }}
          path: parsebench-output

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Publish results or failure diagnostics
        env:
          BENCHMARK_RESULT: ${{ needs.benchmark.result }}
          BUCKET: ${{ vars.PARSEBENCH_GCS_BUCKET }}
          DESTINATION: ${{ needs.benchmark.outputs.destination }}
          OUTPUT_DIR: parsebench-output
        run: python3 "$WORKFLOW_SCRIPTS/publish.py"

  report_outcome:
    name: Report final outcome
    needs:
      - benchmark
      - publish
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout summary helpers
        uses: actions/checkout@v4
        with:
          ref: ${{ github.workflow_sha }}
          path: .workflow-support
          persist-credentials: false
          sparse-checkout: .github/scripts/pymupdf_source_stack

      - name: Report successful completion
        if: ${{ needs.benchmark.result == 'success' && needs.publish.result == 'success' }}
        run: python3 "$WORKFLOW_SCRIPTS/write_outcome.py" success

      - name: Download diagnostic artifact
        if: >-
          ${{
            (needs.benchmark.result == 'failure' || needs.publish.result == 'failure') &&
            needs.benchmark.outputs.artifact_name != ''
          }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.benchmark.outputs.artifact_name }}
          path: failure-diagnostics

      - name: Add error details to workflow summary
        if: ${{ needs.benchmark.result == 'failure' || needs.publish.result == 'failure' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 "$WORKFLOW_SCRIPTS/write_failure_summary.py" \
            --diagnostics failure-diagnostics \
            --output "$GITHUB_STEP_SUMMARY" \
            --benchmark-result "${{ needs.benchmark.result }}" \
            --publish-result "${{ needs.publish.result }}"

      - name: Report incomplete workflow
        if: >-
          ${{
            needs.benchmark.result != 'failure' &&
            needs.publish.result != 'failure' &&
            (needs.benchmark.result != 'success' || needs.publish.result != 'success')
          }}
        run: |
          python3 "$WORKFLOW_SCRIPTS/write_outcome.py" incomplete \
            --benchmark-result "${{ needs.benchmark.result }}" \
            --publish-result "${{ needs.publish.result }}"
